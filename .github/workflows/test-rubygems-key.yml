name: Test RubyGems API Key

on:
  workflow_dispatch:

jobs:
  test-key:
    runs-on: ubuntu-latest
    steps:
      - name: Check if RUBYGEMS_API_KEY is set
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          if [ -z "$GEM_HOST_API_KEY" ]; then
            echo "::error::RUBYGEMS_API_KEY secret is NOT set"
            exit 1
          fi
          echo "RUBYGEMS_API_KEY is set (length: ${#GEM_HOST_API_KEY} chars)"

      - name: Validate key against RubyGems API
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: $GEM_HOST_API_KEY" \
            https://rubygems.org/api/v1/api_key.json)
          if [ "$RESPONSE" = "200" ]; then
            echo "Key is valid (HTTP 200)"
          else
            echo "::error::Key validation failed (HTTP $RESPONSE)"
            exit 1
          fi
